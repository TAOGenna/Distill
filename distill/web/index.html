<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Distill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>Distill</h1>
            <div class="header-actions">
                <a href="https://github.com/TAOGenna/Distill" target="_blank" rel="noopener" class="github-badge" title="Star on GitHub">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" class="github-logo"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    <div class="github-badge-text">
                        <span class="github-badge-title">GitHub</span>
                        <span class="github-badge-stats">
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg>
                            <span id="star-count"></span>
                        </span>
                    </div>
                </a>
                <button type="button" class="theme-toggle" id="theme-toggle" title="toggle theme" aria-label="toggle theme"></button>
            </div>
        </div>
        <p class="tagline">turn technical blogs, papers, and repos into hands-on coursework</p>

        <!-- Configuration panel — collapsible -->
        <div id="setup-panel" class="setup-panel collapsed">
            <h3 class="setup-toggle" id="setup-toggle">
                <span class="setup-arrow"></span> settings
            </h3>
            <div class="setup-row">
                <label for="setup-provider">provider</label>
                <select id="setup-provider">
                    <option value="anthropic">Anthropic</option>
                    <option value="openai">OpenAI</option>
                    <option value="google">Google</option>
                    <option value="ollama">Ollama (local)</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="claude_code">Claude Code</option>
                    <option value="mock">Mock (testing)</option>
                </select>
            </div>
            <div class="setup-row" id="setup-key-row">
                <label for="setup-key">api key</label>
                <input type="password" id="setup-key" placeholder="sk-...">
                <button class="link-btn" id="setup-save">save</button>
            </div>
            <div class="setup-row">
                <label for="cfg-output">output</label>
                <input type="text" id="cfg-output" placeholder="./output">
                <button class="icon-btn" id="browse-output" title="browse for folder">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1.5 3.5v9a1 1 0 001 1h11a1 1 0 001-1v-7a1 1 0 00-1-1H7.5l-2-2h-3a1 1 0 00-1 1z"/>
                    </svg>
                </button>
                <button class="link-btn" id="save-output">save</button>
            </div>
            <div class="setup-row">
                <label for="cfg-revision-cycles">review rounds</label>
                <select id="cfg-revision-cycles">
                    <option value="0">0 (skip review)</option>
                    <option value="1" selected>1 (default)</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="setup-row" id="effort-row">
                <label for="cfg-effort">effort</label>
                <select id="cfg-effort">
                    <option value="low">low (fast, cheap)</option>
                    <option value="medium">medium</option>
                    <option value="high" selected>high (default)</option>
                    <option value="max">max (Opus only, deepest)</option>
                </select>
            </div>
            <div class="setup-row" id="diagrams-row" style="display:none">
                <label for="cfg-diagrams">diagrams</label>
                <select id="cfg-diagrams">
                    <option value="ascii">ASCII (default)</option>
                    <option value="excalidraw">Excalidraw</option>
                </select>
                <span class="diagrams-status" id="diagrams-status"></span>
            </div>
        </div>

        <form id="form">
            <!-- Run presets -->
            <div class="presets-bar">
                <select id="preset-select">
                    <option value="">load preset...</option>
                </select>
                <button type="button" class="link-btn" id="preset-save">save preset</button>
                <button type="button" class="link-btn" id="preset-delete">delete</button>
                <span class="presets-spacer"></span>
                <button type="button" class="link-btn" id="form-clear">clear form</button>
            </div>

            <div class="field field-primary">
                <label for="url-input">source url</label>
                <input type="url" id="url-input" name="url" placeholder="https://blog.example.com/deep-dive" required>
            </div>

            <div id="refs"></div>
            <button type="button" class="link-btn" id="add-ref" style="margin-bottom: 2rem">+ add reference url</button>

            <div class="field">
                <div class="label-row">
                    <label for="level-input">describe your background</label>
                    <select id="profile-select" class="inline-select">
                        <option value="">profiles...</option>
                    </select>
                    <button type="button" class="link-btn" id="profile-save">save profile</button>
                </div>
                <textarea id="level-input" name="level" rows="1" placeholder="mid-level Python dev, new to systems programming" required></textarea>
                <div class="field-hint">what languages/tools do you know? what's new to you?</div>
            </div>

            <div class="field-row field-secondary">
                <div class="field">
                    <label for="design-model">design model <span class="hint">(analysis + curriculum)</span></label>
                    <select name="design_model" id="design-model"></select>
                </div>
                <div class="field">
                    <label for="generate-model">generate model <span class="hint">(exercise files)</span></label>
                    <select name="generate_model" id="generate-model"></select>
                </div>
            </div>

            <div class="sticky-btn-wrapper">
                <button type="submit" class="btn" id="go" disabled>generate</button>
            </div>
        </form>

        <div id="progress">
            <hr class="separator">
            <div class="phase-bar" id="phase-bar">
                <div class="phase-bar-top">
                    <span class="phase-bar-label" id="phase-label">starting...</span>
                    <span class="phase-bar-stats">
                        <span id="phase-elapsed"></span>
                        <span id="phase-cost"></span>
                    </span>
                    <span class="phase-bar-detail" id="phase-detail"></span>
                </div>
                <div class="phase-bar-track">
                    <div class="phase-bar-fill" id="phase-fill"></div>
                </div>
            </div>
            <div id="log-section">
                <button type="button" class="log-toggle" id="log-toggle">
                    <span class="setup-arrow"></span> log
                </button>
                <div id="log" class="log-collapsed" aria-live="polite"></div>
            </div>
        </div>

        <div id="courses-section">
            <hr class="separator">
            <h2>courses</h2>
            <div id="courses">
                <p class="dim">no courses generated yet</p>
            </div>
        </div>

    </div>

    <script src="/app.js"></script>
</body>
</html>
