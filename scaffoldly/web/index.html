<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>scaffoldly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>scaffoldly</h1>
        <p class="tagline">turn technical blogs, papers, and repos into hands-on coursework</p>

        <div id="api-warning" class="warning">
            no api key configured. add one in settings below.
        </div>

        <form id="form">
            <div class="field">
                <label>source url</label>
                <input type="url" name="url" placeholder="https://blog.example.com/deep-dive" required>
            </div>

            <div id="refs"></div>
            <button type="button" class="link-btn" id="add-ref">+ add reference url</button>

            <div class="checkbox-field">
                <input type="checkbox" id="series" name="series">
                <label for="series">series mode</label>
                <span class="hint">ordered progression (part 1 &rarr; 2 &rarr; 3)</span>
            </div>

            <div class="field">
                <label>your level</label>
                <textarea name="level" rows="1" placeholder="mid-level Python dev, new to systems programming" required></textarea>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>design model</label>
                    <select name="design_model" id="design-model"></select>
                </div>
                <div class="field">
                    <label>generate model</label>
                    <select name="generate_model" id="generate-model"></select>
                </div>
            </div>

            <button type="submit" class="btn" id="go">generate</button>
        </form>

        <div id="progress">
            <hr class="separator">
            <div id="log"></div>
        </div>

        <hr class="separator">

        <h2>courses</h2>
        <div id="courses">
            <p class="dim">no courses generated yet</p>
        </div>

        <hr class="separator">

        <h2>settings</h2>
        <form id="settings" onsubmit="return false">
            <div class="settings-row">
                <label>provider</label>
                <select id="cfg-provider">
                    <option value="anthropic">Anthropic</option>
                    <option value="openai">OpenAI</option>
                    <option value="google">Google</option>
                    <option value="ollama">Ollama (local)</option>
                    <option value="openrouter">OpenRouter</option>
                </select>
            </div>
            <div class="settings-row" id="api-key-row">
                <label>api key</label>
                <input type="password" id="cfg-key" placeholder="sk-...">
                <button class="link-btn" id="save-key">save</button>
            </div>
            <div class="settings-row">
                <label>output</label>
                <input type="text" id="cfg-output" placeholder="./output">
                <button class="icon-btn" id="browse-output" title="browse for folder">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1.5 3.5v9a1 1 0 001 1h11a1 1 0 001-1v-7a1 1 0 00-1-1H7.5l-2-2h-3a1 1 0 00-1 1z"/>
                    </svg>
                </button>
                <button class="link-btn" id="save-output">save</button>
            </div>
            <div class="settings-row">
                <label>max review cycles</label>
                <select id="cfg-revision-cycles">
                    <option value="0">0 (skip review)</option>
                    <option value="1" selected>1 (default)</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
        </form>
    </div>

    <script src="/app.js"></script>
</body>
</html>
