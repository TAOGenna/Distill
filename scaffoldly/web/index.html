<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>scaffoldly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>scaffoldly</h1>
        <p class="tagline">turn technical blogs, papers, and repos into hands-on coursework</p>

        <div id="api-warning" class="warning">
            no auth configured. install
            <a href="https://docs.anthropic.com/en/docs/claude-code" target="_blank">Claude Code</a>
            (auto-detected) or add an <code>ANTHROPIC_API_KEY</code> in settings below.
        </div>

        <form id="form">
            <div class="field">
                <label>source url</label>
                <input type="url" name="url" placeholder="https://blog.example.com/deep-dive" required>
            </div>

            <div id="refs"></div>
            <button type="button" class="link-btn" id="add-ref">+ add reference url</button>

            <div class="checkbox-field">
                <input type="checkbox" id="series" name="series">
                <label for="series">series mode</label>
                <span class="hint">ordered progression (part 1 &rarr; 2 &rarr; 3)</span>
            </div>

            <div class="field">
                <label>your level</label>
                <textarea name="level" rows="1" placeholder="mid-level Python dev, new to systems programming" required></textarea>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>design model</label>
                    <select name="model">
                        <option value="claude-opus-4-6">opus</option>
                        <option value="claude-sonnet-4-6">sonnet</option>
                    </select>
                </div>
                <div class="field">
                    <label>generate model</label>
                    <select name="generate_model">
                        <option value="sonnet">sonnet</option>
                        <option value="claude-opus-4-6">opus</option>
                        <option value="claude-haiku-4-5-20251001">haiku</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn" id="go">generate</button>
        </form>

        <div id="progress">
            <hr class="separator">
            <div id="log"></div>
        </div>

        <hr class="separator">

        <h2>courses</h2>
        <div id="courses">
            <p class="dim">no courses generated yet</p>
        </div>

        <hr class="separator">

        <h2>settings</h2>
        <form id="settings" onsubmit="return false">
            <div class="settings-row">
                <label>api key</label>
                <input type="password" id="cfg-key" placeholder="sk-ant-...">
                <button class="link-btn" id="save-key">save</button>
            </div>
            <div class="settings-row">
                <label>output</label>
                <input type="text" id="cfg-output" placeholder="./output">
                <button class="link-btn" id="save-output">save</button>
            </div>
        </form>
    </div>

    <script src="/app.js"></script>
</body>
</html>
